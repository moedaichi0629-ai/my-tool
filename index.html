<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tool - AIツール集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 1.5rem; color: #38bdf8; }
    .hero {
      text-align: center;
      padding: 5rem 2rem;
    }
    .hero h2 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.2rem;
      color: #94a3b8;
      max-width: 500px;
      margin: 0 auto 2.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn:hover { background: #0ea5e9; }
    .tools {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 3rem 2rem;
      flex-wrap: wrap;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 280px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); border-color: #38bdf8; }
    .card h3 { font-size: 1.2rem; margin-bottom: 0.75rem; color: #f1f5f9; }
    .card p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
    footer {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Tool</h1>
  </header>

  <section class="hero">
    <h2>AIツール集</h2>
    <p>日常をもっと便利にするAIツールを開発・公開しています。</p>
    <a href="#tools" class="btn">ツールを見る</a>
  </section>

  <section class="tools" id="tools">
    <div class="card">
      <h3>Live Album Tool</h3>
      <p>ライブ写真を自動で整理・アルバム化するツール。思い出をきれいに保存できます。</p>
    </div>
    <div class="card">
      <h3>Meal Management Tool</h3>
      <p>AIが食事を分析して、栄養バランスとメニューの提案をしてくれるツール。</p>
    </div>
  </section>

  <footer>
    <p>© 2026 My Tool. Built with GitHub.</p>
  </footer>
</body>
</html>
